<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0f1420"/>
  <!-- red "3" candle (left) -->
  <rect x="15" y="9" width="2.6" height="46" rx="1.3" fill="#e23d3d"/>
  <rect x="9" y="19" width="14.6" height="30" rx="2.6" fill="#e23d3d"/>
  <!-- green "2" candle (right) -->
  <rect x="46.4" y="7" width="2.6" height="45" rx="1.3" fill="#26b06b"/>
  <rect x="40.4" y="13" width="14.6" height="34" rx="2.6" fill="#26b06b"/>
  <!-- green "1" small candle (center) -->
  <rect x="30.7" y="23" width="2.6" height="30" rx="1.3" fill="#26b06b"/>
  <rect x="26" y="33" width="12" height="12" rx="2.6" fill="#26b06b"/>
  <!-- numbers -->
  <text x="16.3" y="39" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16" fill="#fff" text-anchor="middle">3</text>
  <text x="32" y="43.6" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="11" fill="#fff" text-anchor="middle">1</text>
  <text x="47.7" y="34" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16" fill="#fff" text-anchor="middle">2</text>
</svg>
